[build]
buildCommand = "npm install && npm run --workspace=apps/api build"

[deploy]
startCommand = "npx prisma db push --schema=apps/api/prisma/schema.prisma --skip-generate && node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
